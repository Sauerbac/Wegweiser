name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Wegweiser ${{ github.ref_name }}
          releaseBody: |
            ## Download

            | File | Description |
            |------|-------------|
            | `Wegweiser_*_x64-setup.exe` | Windows installer (recommended) |
            | `Wegweiser_*_x64_en-US.msi` | Windows MSI package |
            | `Wegweiser.exe` | Portable single executable (no install needed) |

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload portable executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} `
            src-tauri/target/release/Wegweiser.exe `
            --clobber
